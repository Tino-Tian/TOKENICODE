name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      edition:
        description: 'Edition (alpha/beta/stable)'
        required: true
        default: 'beta'
        type: choice
        options:
          - alpha
          - beta
          - stable

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect edition
        id: edition
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"

          # workflow_dispatch 手动触发时，优先使用输入参数
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            MODE="${{ inputs.edition }}"
            BUILD_DATE="$(date +%Y%m%d-%H%M)"
            case "$MODE" in
              alpha)
                echo "edition=alpha" >> $GITHUB_OUTPUT
                echo "prerelease=true" >> $GITHUB_OUTPUT
                echo "release_name=TCAlpha ci-$BUILD_DATE" >> $GITHUB_OUTPUT
                echo "extra_args=--config editions/alpha/tauri.alpha.conf.json" >> $GITHUB_OUTPUT
                ;;
              beta)
                echo "edition=beta" >> $GITHUB_OUTPUT
                echo "prerelease=true" >> $GITHUB_OUTPUT
                echo "release_name=NOVA Beta ci-$BUILD_DATE" >> $GITHUB_OUTPUT
                echo "extra_args=--config editions/beta/tauri.beta.conf.json" >> $GITHUB_OUTPUT
                ;;
              stable)
                echo "edition=stable" >> $GITHUB_OUTPUT
                echo "prerelease=false" >> $GITHUB_OUTPUT
                echo "release_name=NOVA ci-$BUILD_DATE" >> $GITHUB_OUTPUT
                echo "extra_args=" >> $GITHUB_OUTPUT
                ;;
            esac
            echo "tag_name=ci-${MODE}-${BUILD_DATE}" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *"-alpha"* ]]; then
            echo "edition=alpha" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "release_name=TCAlpha $TAG" >> $GITHUB_OUTPUT
            echo "extra_args=--config editions/alpha/tauri.alpha.conf.json" >> $GITHUB_OUTPUT
            echo "tag_name=$TAG" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *"-beta"* ]]; then
            echo "edition=beta" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "release_name=NOVA Beta $TAG" >> $GITHUB_OUTPUT
            echo "extra_args=--config editions/beta/tauri.beta.conf.json" >> $GITHUB_OUTPUT
            echo "tag_name=$TAG" >> $GITHUB_OUTPUT
          else
            echo "edition=stable" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "release_name=NOVA $TAG" >> $GITHUB_OUTPUT
            echo "extra_args=" >> $GITHUB_OUTPUT
            echo "tag_name=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EDITION: ${{ steps.edition.outputs.edition }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ steps.edition.outputs.tag_name }}
          releaseName: ${{ steps.edition.outputs.release_name }}
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: ${{ steps.edition.outputs.prerelease == 'true' }}
          args: ${{ matrix.args }} ${{ steps.edition.outputs.extra_args }}
